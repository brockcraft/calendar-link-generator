<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add-to-Calendar Link Generator</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none'><rect x='3' y='4' width='18' height='17' rx='2' stroke='%233b6ff5' stroke-width='1.7'/><path d='M3 9H21' stroke='%233b6ff5' stroke-width='1.7'/><path d='M8 2V6M16 2V6' stroke='%233b6ff5' stroke-width='1.7' stroke-linecap='round'/><circle cx='8' cy='14' r='1.2' fill='%233b6ff5'/><circle cx='12' cy='14' r='1.2' fill='%233b6ff5'/><circle cx='16' cy='14' r='1.2' fill='%233b6ff5'/></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');

    :root {
      --bg:          #f4f5f7;
      --surface:     #ffffff;
      --surface2:    #f8f9fb;
      --border:      #e2e5ea;
      --border2:     #c8cdd6;
      --accent:      #3b6ff5;
      --accent-soft: rgba(59,111,245,0.10);
      --accent-glow: rgba(59,111,245,0.18);
      --text:        #1a1d26;
      --text-muted:  #7b829a;
      --text-dim:    #9ea5bc;
      --success:     #16a34a;
      --warn:        #b45309;
      --warn-bg:     #fffbeb;
      --warn-border: #fcd34d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .logo {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px;
      background: var(--accent-soft);
      border: 1px solid rgba(59,111,245,0.25);
      border-radius: 8px;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .pill {
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(59,111,245,0.2);
      padding: 3px 10px;
      border-radius: 100px;
      letter-spacing: 0.05em;
    }

    .layout {
      display: grid;
      grid-template-columns: 370px 1fr;
      min-height: calc(100vh - 63px);
    }

    .form-panel {
      border-right: 1px solid var(--border);
      padding: 24px 20px;
      overflow-y: auto;
      background: var(--surface);
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .field { margin-bottom: 12px; }

    label {
      display: block;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--text-muted);
      margin-bottom: 4px;
      letter-spacing: 0.04em;
    }

    label .req { color: var(--accent); margin-left: 2px; }

    input[type="text"],
    input[type="time"],
    input[type="url"],
    textarea,
    select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 8px 11px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    textarea { resize: vertical; min-height: 74px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 18px 0;
    }

    /* ── Date picker ── */
    .date-field-wrap { position: relative; }

    .date-trigger {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 8px 11px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.15s, box-shadow 0.15s;
      user-select: none;
    }

    .date-trigger:hover { border-color: var(--border2); }

    .date-trigger.open {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .date-trigger .placeholder { color: var(--text-muted); }
    .date-trigger .cal-icon { color: var(--text-muted); font-size: 15px; }

    .cal-popup {
      display: none;
      position: absolute;
      z-index: 200;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.13), 0 2px 8px rgba(0,0,0,0.06);
      padding: 14px;
      width: 276px;
      margin-top: 4px;
    }

    .cal-popup.open { display: block; }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .cal-nav-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      width: 28px; height: 28px;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      transition: all 0.12s;
      line-height: 1;
    }

    .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }

    .cal-month-label {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .cal-dow {
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      padding: 4px 0 6px;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12.5px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      color: var(--text);
    }

    .cal-day:hover:not(.empty) { background: var(--accent-soft); color: var(--accent); }
    .cal-day.empty { cursor: default; pointer-events: none; }
    .cal-day.today { font-weight: 700; color: var(--accent); }
    .cal-day.selected { background: var(--accent); color: white; font-weight: 600; }
    .cal-day.selected:hover { background: var(--accent); color: white; }
    .cal-day.past { color: var(--text-dim); }

    /* ── Checkbox group ── */
    .check-group { display: flex; flex-direction: column; gap: 7px; }

    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--surface2);
    }

    .check-item:hover { border-color: var(--border2); background: #f1f3f8; }
    .check-item input[type="checkbox"] { width: 14px; height: 14px; margin: 0; cursor: pointer; accent-color: var(--accent); }
    .cal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .check-item span { font-size: 13px; color: var(--text); }

    /* ── Generate btn ── */
    .generate-btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.01em;
      box-shadow: 0 2px 8px rgba(59,111,245,0.25);
    }

    .generate-btn:hover { opacity: 0.92; box-shadow: 0 4px 14px rgba(59,111,245,0.3); }
    .generate-btn:active { transform: scale(0.99); }

    /* ── Output panel ── */
    .output-panel { padding: 24px; overflow-y: auto; background: var(--bg); }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 400px; gap: 10px; color: var(--text-dim);
    }

    .empty-state .icon { font-size: 36px; opacity: 0.5; }
    .empty-state p { font-family: 'DM Mono', monospace; font-size: 12px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }

    .card-label {
      font-family: 'DM Mono', monospace;
      font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted);
    }

    .preview-buttons { display: flex; flex-wrap: wrap; gap: 7px; }

    .prev-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 5px;
      font-size: 13px; font-weight: 500; text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.15s, transform 0.1s;
    }

    .prev-btn:hover { opacity: 0.86; transform: translateY(-1px); }

    pre {
      font-family: 'DM Mono', monospace;
      font-size: 11.5px;
      background: #f6f8fc;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 14px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: #374060;
      line-height: 1.65;
      max-height: 320px;
    }

    .copy-btn, .dl-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px; padding: 5px 11px; border-radius: 5px;
      cursor: pointer; transition: all 0.15s;
      border: 1px solid var(--border2); background: white; color: var(--text-muted);
    }

    .copy-btn:hover, .dl-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.ok { border-color: var(--success); color: var(--success); }

    .dl-btn {
      display: inline-flex; align-items: center; gap: 6px;
      text-decoration: none; font-size: 12px; padding: 7px 13px;
    }

    .note {
      margin-top: 12px;
      background: var(--warn-bg); border: 1px solid var(--warn-border);
      border-radius: 7px; padding: 11px 13px;
      font-size: 12px; color: var(--warn); line-height: 1.6;
    }

    .note strong { color: #92400e; }
    .note code { background: rgba(180,83,9,0.08); padding: 1px 5px; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 11px; }

    .hint {
      margin-top: 10px;
      background: rgba(59,111,245,0.05); border: 1px solid rgba(59,111,245,0.15);
      border-radius: 7px; padding: 10px 13px;
      font-size: 12px; color: #3b5bbf; line-height: 1.6;
    }

    .hint code { background: rgba(59,111,245,0.1); padding: 1px 5px; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 11px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
      <rect x="3" y="4" width="18" height="17" rx="2" stroke="#3b6ff5" stroke-width="1.7"/>
      <path d="M3 9H21" stroke="#3b6ff5" stroke-width="1.7"/>
      <path d="M8 2V6M16 2V6" stroke="#3b6ff5" stroke-width="1.7" stroke-linecap="round"/>
      <circle cx="8" cy="14" r="1.2" fill="#3b6ff5"/>
      <circle cx="12" cy="14" r="1.2" fill="#3b6ff5"/>
      <circle cx="16" cy="14" r="1.2" fill="#3b6ff5"/>
    </svg>
  </div>
  <h1>Add-to-Calendar Generator</h1>
  <span class="pill">FOR HTML EMAIL</span>
</header>

<div class="layout">

  <!-- FORM -->
  <div class="form-panel">
    <div class="section-label">Event Details</div>

    <div class="field">
      <label>Event Title <span class="req">*</span></label>
      <input type="text" id="title" placeholder="e.g. Spring Workshop" />
    </div>

    <!-- Calendar picker -->
    <div class="field">
      <label>Date <span class="req">*</span></label>
      <div class="date-field-wrap">
        <div class="date-trigger" id="dateTrigger" onclick="toggleCal(event)">
          <span id="dateTriggerLabel" class="placeholder">Select a date…</span>
          <span class="cal-icon">📅</span>
        </div>
        <div class="cal-popup" id="calPopup">
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="shiftMonth(event,-1)">&#8249;</button>
            <span class="cal-month-label" id="calMonthLabel"></span>
            <button class="cal-nav-btn" onclick="shiftMonth(event,1)">&#8250;</button>
          </div>
          <div class="cal-grid" id="calGrid"></div>
        </div>
      </div>
      <input type="hidden" id="date" />
    </div>

    <div class="row2">
      <div class="field">
        <label>Start Time</label>
        <input type="time" id="startTime" value="09:00" />
      </div>
      <div class="field">
        <label>End Time</label>
        <input type="time" id="endTime" value="10:00" />
      </div>
    </div>

    <div class="field">
      <label>Timezone</label>
      <select id="timezone">
        <option value="America/New_York">Eastern (ET)</option>
        <option value="America/Chicago">Central (CT)</option>
        <option value="America/Denver">Mountain (MT)</option>
        <option value="America/Los_Angeles" selected>Pacific (PT)</option>
        <option value="America/Anchorage">Alaska (AKT)</option>
        <option value="Pacific/Honolulu">Hawaii (HT)</option>
        <option value="Europe/London">London (GMT/BST)</option>
        <option value="Europe/Paris">Paris / Berlin (CET)</option>
        <option value="Asia/Tokyo">Tokyo (JST)</option>
        <option value="Australia/Sydney">Sydney (AEST)</option>
        <option value="UTC">UTC</option>
      </select>
    </div>

    <div class="field">
      <label>Location / URL</label>
      <input type="text" id="location" placeholder="Zoom link, address, or 'Online'" />
    </div>

    <div class="field">
      <label>Description</label>
      <textarea id="description" placeholder="Agenda, instructions, or details…"></textarea>
    </div>

    <input type="hidden" id="icsUrl" />

    <hr class="divider" />
    <div class="section-label">Calendars to Include</div>

    <div class="check-group" id="calChecks">
      <label class="check-item">
        <input type="checkbox" value="google" checked />
        <span class="cal-dot" style="background:#EA4335"></span>
        <span>Google Calendar</span>
      </label>
      <label class="check-item">
        <input type="checkbox" value="outlook" checked />
        <span class="cal-dot" style="background:#0078D4"></span>
        <span>Outlook.com</span>
      </label>
      <label class="check-item">
        <input type="checkbox" value="office365" checked />
        <span class="cal-dot" style="background:#D83B01"></span>
        <span>Office 365</span>
      </label>
      <label class="check-item">
        <input type="checkbox" value="yahoo" checked />
        <span class="cal-dot" style="background:#6001D2"></span>
        <span>Yahoo Calendar</span>
      </label>
      <label class="check-item">
        <input type="checkbox" value="apple" checked />
        <span class="cal-dot" style="background:#555555"></span>
        <span>Apple / iCal</span>
      </label>
    </div>

    <button class="generate-btn" onclick="generate()">⚡ Generate Embed Code</button>
  </div>

  <!-- OUTPUT -->
  <div class="output-panel">
    <div class="section-label" style="margin-bottom:16px;">Output</div>
    <div id="output">
      <div class="empty-state">
        <div class="icon">🗓</div>
        <p>Fill in event details and click Generate</p>
      </div>
    </div>
  </div>
</div>

<script>
  // ── Apps Script integration ──
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzyRt6GaL8te2XFMuR-5NDR-i9F_w0AXVKRFk9zf1zl4EezATuDH-DOA57wioS_31VuxA/exec';
  let lastIcsContent = null;
  let lastSafeTitle  = null;

  // ── Calendar picker ──
  const _today = new Date(); _today.setHours(0,0,0,0);
  let calYear  = _today.getFullYear();
  let calMonth = _today.getMonth();
  let selDate  = null;

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOWS   = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  function renderCal() {
    document.getElementById('calMonthLabel').textContent = `${MONTHS[calMonth]} ${calYear}`;
    const grid  = document.getElementById('calGrid');
    const first = new Date(calYear, calMonth, 1).getDay();
    const days  = new Date(calYear, calMonth + 1, 0).getDate();
    let html = DOWS.map(d => `<div class="cal-dow">${d}</div>`).join('');
    for (let i = 0; i < first; i++) html += `<div class="cal-day empty"></div>`;
    for (let d = 1; d <= days; d++) {
      const dt = new Date(calYear, calMonth, d);
      let cls  = 'cal-day';
      if (dt.getTime() === _today.getTime()) cls += ' today';
      if (selDate && dt.getTime() === selDate.getTime()) cls += ' selected';
      else if (dt < _today) cls += ' past';
      html += `<div class="${cls}" onclick="pickDay(${calYear},${calMonth},${d})">${d}</div>`;
    }
    grid.innerHTML = html;
  }

  function shiftMonth(ev, dir) {
    ev.stopPropagation();
    calMonth += dir;
    if (calMonth < 0)  { calMonth = 11; calYear--; }
    if (calMonth > 11) { calMonth = 0;  calYear++; }
    renderCal();
  }

  function pickDay(y, m, d) {
    selDate = new Date(y, m, d);
    const p2 = n => String(n).padStart(2,'0');
    document.getElementById('date').value = `${y}-${p2(m+1)}-${p2(d)}`;
    const lbl = document.getElementById('dateTriggerLabel');
    lbl.textContent = selDate.toLocaleDateString('en-US', { weekday:'short', month:'long', day:'numeric', year:'numeric' });
    lbl.classList.remove('placeholder');
    closeCal();
    renderCal();
  }

  function toggleCal(ev) {
    ev.stopPropagation();
    const popup = document.getElementById('calPopup');
    if (popup.classList.contains('open')) { closeCal(); return; }
    popup.classList.add('open');
    document.getElementById('dateTrigger').classList.add('open');
    renderCal();
  }

  function closeCal() {
    document.getElementById('calPopup').classList.remove('open');
    document.getElementById('dateTrigger').classList.remove('open');
  }

  document.addEventListener('click', e => {
    if (!document.querySelector('.date-field-wrap').contains(e.target)) closeCal();
  });

  // ── Helpers ──
  function pad(n) { return String(n).padStart(2,'0'); }

  function toCompact(ds, ts) {
    if (!ds || !ts) return '';
    const [y,mo,d] = ds.split('-'), [h,min] = ts.split(':');
    return `${y}${mo}${d}T${h}${min}00`;
  }

  function toISO(ds, ts) { return ds && ts ? `${ds}T${ts}:00` : ''; }
  function e(s)  { return encodeURIComponent(s || ''); }
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // ── Link builders ──
  function buildGoogle(t,d,s,en,loc,desc) {
    return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${e(t)}&dates=${toCompact(d,s)}/${toCompact(d,en)}&details=${e(desc)}&location=${e(loc)}`;
  }

  function buildOutlook(base,t,d,s,en,loc,desc) {
    return `${base}?subject=${e(t)}&startdt=${toISO(d,s)}&enddt=${toISO(d,en)}&body=${e(desc)}&location=${e(loc)}&path=/calendar/action/compose&rru=addevent`;
  }

  function buildYahoo(t,d,s,en,loc,desc) {
    return `https://calendar.yahoo.com/?v=60&title=${e(t)}&st=${toCompact(d,s)}&et=${toCompact(d,en)}&desc=${e(desc)}&in_loc=${e(loc)}`;
  }

  function buildICS(t,d,s,en,loc,desc,tz) {
    const now   = new Date();
    const stamp = `${now.getUTCFullYear()}${pad(now.getUTCMonth()+1)}${pad(now.getUTCDate())}T${pad(now.getUTCHours())}${pad(now.getUTCMinutes())}${pad(now.getUTCSeconds())}Z`;
    return [
      'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Calendar Link Generator//EN',
      'CALSCALE:GREGORIAN','METHOD:PUBLISH','BEGIN:VEVENT',
      `DTSTART;TZID=${tz}:${toCompact(d,s)}`,
      `DTEND;TZID=${tz}:${toCompact(d,en)}`,
      `DTSTAMP:${stamp}`,
      `UID:event-${Date.now()}@calendar-generator`,
      `SUMMARY:${t}`,
      `DESCRIPTION:${(desc||'').replace(/\n/g,'\\n').replace(/,/g,'\\,')}`,
      `LOCATION:${(loc||'').replace(/,/g,'\\,')}`,
      'END:VEVENT','END:VCALENDAR'
    ].join('\r\n');
  }

  // ── Palettes ──
  const PALETTES = {
    colored: {
      google:    {bg:'#EA4335',color:'#fff',border:'none'},
      outlook:   {bg:'#0078D4',color:'#fff',border:'none'},
      office365: {bg:'#D83B01',color:'#fff',border:'none'},
      yahoo:     {bg:'#6001D2',color:'#fff',border:'none'},
      apple:     {bg:'#555555',color:'#fff',border:'none'},
    },
    dark: {
      google:    {bg:'#1a1a1a',color:'#fff',border:'none'},
      outlook:   {bg:'#1a1a1a',color:'#fff',border:'none'},
      office365: {bg:'#1a1a1a',color:'#fff',border:'none'},
      yahoo:     {bg:'#1a1a1a',color:'#fff',border:'none'},
      apple:     {bg:'#1a1a1a',color:'#fff',border:'none'},
    },
    outline: {
      google:    {bg:'#fff',color:'#EA4335',border:'2px solid #EA4335'},
      outlook:   {bg:'#fff',color:'#0078D4',border:'2px solid #0078D4'},
      office365: {bg:'#fff',color:'#D83B01',border:'2px solid #D83B01'},
      yahoo:     {bg:'#fff',color:'#6001D2',border:'2px solid #6001D2'},
      apple:     {bg:'#fff',color:'#555555',border:'2px solid #555555'},
    }
  };

  const LABELS = {
    google:'📅 Google Calendar', outlook:'📅 Outlook.com',
    office365:'📅 Office 365',   yahoo:'📅 Yahoo Calendar', apple:'📅 Apple / iCal',
  };

  function buildEmailHTML(links, style, enabled) {
    const pal  = PALETTES[style] || PALETTES.colored;
    const btns = enabled.map(key => {
      if (!links[key]) return '';
      const p = pal[key];
      return `      <a href="${links[key]}" target="_blank" style="display:inline-block; background-color:${p.bg}; color:${p.color}; text-decoration:none; padding:10px 18px; border-radius:5px; font-family:Arial,Helvetica,sans-serif; font-size:13px; font-weight:600; margin:4px 4px 4px 0; border:${p.border};">${LABELS[key]}</a>`;
    }).filter(Boolean);

    return `<!-- ✦ Add to Calendar — paste into Mailchimp Custom HTML block -->
<table cellpadding="0" cellspacing="0" border="0" role="presentation" style="margin:16px 0 8px;">
  <tr>
    <td>
      <p style="font-family:Arial,Helvetica,sans-serif; font-size:14px; color:#555555; margin:0 0 10px 0;">Add to your calendar:</p>
${btns.join('\n')}
    </td>
  </tr>
</table>
<!-- ✦ End Add to Calendar -->`;
  }

  function getEnabled() {
    return Array.from(document.querySelectorAll('#calChecks input[type=checkbox]'))
      .filter(cb => cb.checked).map(cb => cb.value);
  }

  function generate() {
    const title  = document.getElementById('title').value.trim();
    const date   = document.getElementById('date').value;
    const start  = document.getElementById('startTime').value || '09:00';
    const end    = document.getElementById('endTime').value   || '10:00';
    const tz     = document.getElementById('timezone').value;
    const loc    = document.getElementById('location').value.trim();
    const desc   = document.getElementById('description').value.trim();
    const icsUrl = document.getElementById('icsUrl').value.trim();
    const style  = 'outline';
    const enabled = getEnabled();

    if (!title) { alert('Please enter an event title.'); return; }
    if (!date)  { alert('Please pick a date on the calendar.'); return; }

    const links = {};
    if (enabled.includes('google'))    links.google    = buildGoogle(title,date,start,end,loc,desc);
    if (enabled.includes('outlook'))   links.outlook   = buildOutlook('https://outlook.live.com/calendar/0/deeplink/compose',title,date,start,end,loc,desc);
    if (enabled.includes('office365')) links.office365 = buildOutlook('https://outlook.office.com/calendar/0/deeplink/compose',title,date,start,end,loc,desc);
    if (enabled.includes('yahoo'))     links.yahoo     = buildYahoo(title,date,start,end,loc,desc);
    if (enabled.includes('apple'))     links.apple     = icsUrl || '#upload-ics-file-here';

    const icsContent = buildICS(title,date,start,end,loc,desc,tz);
    const icsDataUri = 'data:text/calendar;charset=utf8,' + encodeURIComponent(icsContent);
    const safeTitle  = title.replace(/[/\\:*?"<>|]/g,'').trim().replace(/\s+/g,'-');
    const emailHTML  = buildEmailHTML(links,style,enabled);
    const palette    = PALETTES[style];

    const previewBtns = enabled.map(key => {
      if (!links[key]) return '';
      const p   = palette[key];
      const href = key === 'apple' ? icsDataUri : links[key];
      const tgt  = key === 'apple' ? '' : 'target="_blank"';
      const dl   = key === 'apple' ? `download="${safeTitle}.ics"` : '';
      return `<a href="${href}" ${tgt} ${dl} class="prev-btn" style="background:${p.bg}; color:${p.color}; border:${p.border};">${LABELS[key]}</a>`;
    }).join('');

    const appleUpload = enabled.includes('apple') ? `
      <div style="margin-top:12px; padding-top:12px; border-top:1px solid #e2e5ea; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
        <span style="font-family:'DM Mono',monospace; font-size:9.5px; color:#7b829a; text-transform:uppercase; letter-spacing:0.1em;">Apple / iCal</span>
        <button id="uploadBtn" class="dl-btn" onclick="uploadICS()">☁ Publish to GitHub</button>
        <span id="upload-status" style="font-family:'DM Mono',monospace; font-size:11px;"></span>

      </div>` : '';

    lastIcsContent = icsContent;
    lastSafeTitle  = safeTitle;

    document.getElementById('output').innerHTML = `
      <div class="card">
        <div class="card-header"><span class="card-label">Step 1: Apple / iCal</span></div>
        <p style="font-family:Arial,sans-serif; font-size:13px; color:#888; margin-bottom:10px;">Add to your calendar:</p>
        <div class="preview-buttons">${previewBtns}</div>
        ${appleUpload}
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-label">Step 2: HTML Embed Code — paste into Mailchimp "Code" block</span>
          <button class="copy-btn" onclick="cp(this,'embed-code')">Copy</button>
        </div>
        <pre id="embed-code">${esc(emailHTML)}</pre>
        <div class="hint">
          In Mailchimp, drag in a <strong>Code</strong> content block (the &lt;/&gt; icon) and paste this HTML directly.
          The <code>&lt;table&gt;</code> wrapper keeps it compatible across email clients.
        </div>
      </div>`;
  }

  async function uploadICS() {
    if (!lastIcsContent) return;
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes('PASTE')) {
      alert('Paste your Apps Script Web App URL into the APPS_SCRIPT_URL constant in the HTML.');
      return;
    }
    const btn    = document.getElementById('uploadBtn');
    const status = document.getElementById('upload-status');
    btn.disabled    = true;
    btn.textContent = 'Uploading…';
    status.textContent = '';
    status.style.color = '';
    try {
      const res  = await fetch(APPS_SCRIPT_URL, {
        method:   'POST',
        headers:  { 'Content-Type': 'text/plain' },
        body:     JSON.stringify({ filename: lastSafeTitle + '.ics', content: lastIcsContent }),
        redirect: 'follow'
      });
      const json = await res.json();
      if (json.ok) {
        document.getElementById('icsUrl').value = json.url;
        btn.textContent = '☁ Upload to Drive';
        btn.disabled    = false;
        generate(); // rebuild output with the hosted URL now in the Apple button
        // Set status after generate() so the DOM rebuild doesn't wipe it
        document.getElementById('upload-status').textContent = '✓ Uploaded';
        document.getElementById('upload-status').style.color = 'var(--success)';
      } else {
        throw new Error(json.error || 'Upload failed');
      }
    } catch (err) {
      status.textContent = '✗ ' + err.message;
      status.style.color = '#dc2626';
      btn.textContent    = '☁ Upload to Drive';
      btn.disabled       = false;
    }
  }

  function cp(btn, id) {
    navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
      btn.textContent = 'Copied ✓'; btn.classList.add('ok');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 2500);
    });
  }
</script>
</body>
</html>
